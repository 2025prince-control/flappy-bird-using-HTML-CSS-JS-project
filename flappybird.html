<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <link rel="stylesheet" href="flappybird.css">
</head>

<body>

<div class="game" id="game">
    <div class="sky-overlay" id="skyOverlay"></div>
    <div class="sun" id="sun"></div>

    <div class="stars"></div>

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>

    <div class="score">
        Score: <span id="score">0</span>
    </div>

    <!-- FIXED IMAGE PATH -->
    <img src="flappy-bird.png" id="bird" class="bird">

    <div class="grass"></div>
    <div class="soil"></div>

    <div class="game-over-card" id="gameOverCard">

        <h1>GAME OVER</h1>

        <p class="final-score">
            Score: <span id="finalScore">0</span>
        </p>

        <div class="buttons">
            <button id="restartBtn">Restart</button>
            <button id="homeBtn">Home</button>
        </div>

    </div>

</div>

<div class="name-popup" id="namePopup">
    <h2>Enter Your Name</h2>
    <input type="text" id="playerNameInput" placeholder="Your Name">
    <button id="saveScoreBtn">Save Score</button>
</div>

<script src="flappybird.js"></script>
